<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Vitae - JeongminSeo</title>
  <link rel="stylesheet" href="https://latex.vercel.app/style.css">
  <link rel="stylesheet" href="https://latex.vercel.app/prism/prism.css" />
  <style>
    .category {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .category h2 {
      margin-top: 0;
    }
    .category ul {
      list-style: none;
      padding: 0;
    }
    .category ul li {
      margin-bottom: 10px;
    }
    header h1 a {
      display: inline-block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      color: inherit;
    }
    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      margin: 20px 0;
      padding: 10px 0;
    }
    .content ul {
      display: flex;
      list-style: none;
      padding: 0;
      margin: 0;
      justify-content: space-around;
      width: 60%;
    }
    .content ul li {
      margin: 0 20px;
    }
    .content ul li a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body class="latex-dark">
  <header>
    <h1><a href="index.html" class="latex">J<span> e</span>O<span>N</span>GMin.Seo</a></h1>
    <p class="author">
      Blog <br />
      May 28, 2000
    </p>
  </header>

  <div class="abstract">
    <h2>Abstract</h2>
    <p>A SUPER SALTY SPITOON only uses html. Footlose hitchhiker travels wisdom.</p>
  </div>

  <section class="content">
    <ul>
      <li><a href="cv.html">Curriculum Vitae</a></li>
      <li><a href="post.html">Post</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </section>

  <article class="indent-pars">
    <section class="category">
      <h2>Curriculum Vitae</h2>
      <div id="cv-content">
        <!-- CV content from markdown file will be loaded here -->
      </div>
    </section>
  </article>

  <script>
    // Load the CV markdown file
    fetch('post/CV/cv.md')
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok ' + response.statusText);
        }
        return response.text();
      })
      .then(text => {
        const cvContent = document.getElementById('cv-content');
        cvContent.innerHTML = marked(text);
        console.log(text);  // 콘솔에 마크다운 파일의 내용 출력
      })
      .catch(error => {
        console.error('There has been a problem with your fetch operation:', error);
      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
